# This workflow is tag-triggered by Release Please. It publishes binary release
# assets with GoReleaser, publishes the container image with Docker-native
# Actions, attests both artifact classes through GitHub-native attestations, and
# leaves draft publication as a human decision after inspection.

name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string

permissions: {}

env:
  IMAGE_NAME: ghcr.io/meigma/template-go

jobs:
  resolve-release:
    name: Resolve Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
      version: ${{ steps.release-tag.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            v*) ;;
            *) echo "Release tag must start with v: $tag" >&2; exit 1 ;;
          esac

          version="${tag#v}"
          if [ -z "$version" ] || [ "$version" = "$tag" ]; then
            echo "could not resolve release version from $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          for attempt in $(seq 1 30); do
            if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
              exit 0
            fi
            echo "Draft release $RELEASE_TAG is not ready yet; retrying..."
            sleep 10
          done

          echo "Draft release $RELEASE_TAG was not found or is not a draft." >&2
          exit 1

  binary-release-assets:
    name: Binary Release Assets
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout --detach "${{ needs.resolve-release.outputs.tag }}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser without publishing
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Stage and validate ghd release assets
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          binary_name="template-go"
          asset_prefix="${binary_name}_"
          expected_signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          actual_signer="$(awk -F'"' '/signer_workflow/ { print $2; exit }' ghd.toml)"

          if [ "$version" = "$RELEASE_TAG" ] || [ -z "$version" ]; then
            echo "could not resolve release version from $RELEASE_TAG" >&2
            exit 1
          fi

          if [ "$actual_signer" != "$expected_signer" ]; then
            echo "ghd.toml signer_workflow must be $expected_signer, got $actual_signer" >&2
            exit 1
          fi

          grep -Fq "name = \"$binary_name\"" ghd.toml
          grep -Fq "tag_pattern = \"v\${version}\"" ghd.toml
          grep -Fq "path = \"$binary_name\"" ghd.toml

          mkdir -p dist/release-assets

          jq -r --arg asset_prefix "$asset_prefix" '
            .[]
            | select(
                (.type == "Binary" and (.name | startswith($asset_prefix))) or
                (.type == "SBOM" and (.name | startswith($asset_prefix))) or
                (.type == "Checksum" and .name == "checksums.txt")
              )
            | [.type, .name, .path]
            | @tsv
          ' dist/artifacts.json |
          while IFS="$(printf '\t')" read -r type name artifact_path; do
            case "$type" in
              Binary)
                cp "$artifact_path" "dist/release-assets/$name"
                chmod 0755 "dist/release-assets/$name"
                ;;
              SBOM)
                cp "$artifact_path" "dist/release-assets/$(basename "$artifact_path")"
                ;;
              Checksum)
                cp "$artifact_path" "dist/release-assets/checksums.txt"
                ;;
            esac
          done

          test -f dist/release-assets/checksums.txt
          (cd dist/release-assets && shasum -a 256 -c checksums.txt)

          for os in darwin linux; do
            for arch in amd64 arm64; do
              expected="${binary_name}_${version}_${os}_${arch}"
              expected_sbom="${expected}.sbom.json"
              expected_pattern="pattern = \"${binary_name}_\${version}_${os}_${arch}\""

              test -x "dist/release-assets/$expected"
              test -f "dist/release-assets/$expected_sbom"
              grep -Fq "$expected_pattern" ghd.toml
              awk -v name="$expected" '$2 == name && length($1) == 64 && $1 ~ /^[[:xdigit:]]+$/ { found = 1 } END { exit(found ? 0 : 1) }' dist/release-assets/checksums.txt
            done
          done

          asset_count="$(find dist/release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" != "9" ]; then
            echo "expected 9 draft release assets, found $asset_count" >&2
            find dist/release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi

          find dist/release-assets -maxdepth 1 -type f -print | sort

      - name: Smoke test release binary
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          binary_name="template-go"
          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          bin="dist/release-assets/${binary_name}_${version}_${host_os}_${host_arch}"

          if [ ! -x "$bin" ]; then
            echo "failed to locate executable host binary artifact $bin" >&2
            find dist/release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi

          output="$("$bin" --version)"
          printf '%s\n' "$output"

          case "$output" in
            "$binary_name "*"$version"*) ;;
            *) echo "unexpected version output: $output" >&2; exit 1 ;;
          esac

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/release-assets/* --clobber

      - name: Attest release checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/release-assets/checksums.txt

  container-image-release:
    name: Container Image Release
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
      - binary-release-assets
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      image-name: ${{ steps.image.outputs.name }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout --detach "${{ needs.resolve-release.outputs.tag }}"

      - name: Resolve image metadata
        id: image
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          set -euo pipefail

          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "go-version=$(cat .go-version)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_NAME}:${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.resolve-release.outputs.tag }}
          labels: |
            org.opencontainers.image.title=template-go
            org.opencontainers.image.description=Meigma Go repository template application
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.resolve-release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.image.outputs.commit }}

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          build-args: |
            GO_VERSION=${{ steps.image.outputs.go-version }}
            VERSION=${{ steps.image.outputs.version }}
            COMMIT=${{ steps.image.outputs.commit }}
            DATE=${{ steps.image.outputs.date }}
            SOURCE=https://github.com/${{ github.repository }}

      - name: Smoke test release image
        run: |
          set -euo pipefail

          docker run --rm "${{ steps.image.outputs.tag }}" --version
          docker run --rm "${{ steps.image.outputs.tag }}" --message "hello from container"

      - name: Attest container image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release-inspection-summary:
    name: Release Inspection Summary
    runs-on: ubuntu-24.04
    needs:
      - resolve-release
      - binary-release-assets
      - container-image-release
    permissions: {}
    steps:
      - name: Write inspection summary
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
          IMAGE_NAME: ${{ needs.container-image-release.outputs.image-name }}
          IMAGE_DIGEST: ${{ needs.container-image-release.outputs.image-digest }}
        run: |
          {
            echo "## Draft release ready for inspection"
            echo
            echo "Release: $RELEASE_TAG"
            echo
            echo "Binary verification commands:"
            echo
            echo '```sh'
            echo "gh release view $RELEASE_TAG --repo $GITHUB_REPOSITORY --json isDraft,assets"
            echo "asset=\"template-go_${RELEASE_VERSION}_\$(go env GOOS)_\$(go env GOARCH)\""
            echo "gh attestation verify \"dist/release-assets/\${asset}\" --repo \"$GITHUB_REPOSITORY\" --signer-workflow \"$GITHUB_REPOSITORY/.github/workflows/release.yml\" --source-ref \"refs/tags/$RELEASE_TAG\" --deny-self-hosted-runners"
            echo "ghd download \"$GITHUB_REPOSITORY/template-go@${RELEASE_VERSION}\" --output \"\$(mktemp -d)\""
            echo '```'
            echo
            echo "Container verification commands:"
            echo
            echo '```sh'
            echo "docker login ghcr.io"
            echo "docker pull \"${IMAGE_NAME}:${RELEASE_TAG}\""
            echo "docker run --rm \"${IMAGE_NAME}:${RELEASE_TAG}\" --version"
            echo "gh attestation verify \"oci://${IMAGE_NAME}@${IMAGE_DIGEST}\" --repo \"$GITHUB_REPOSITORY\" --signer-workflow \"$GITHUB_REPOSITORY/.github/workflows/release.yml\" --source-ref \"refs/tags/$RELEASE_TAG\" --deny-self-hosted-runners"
            echo '```'
            echo
            echo "Publish or reject the draft release manually after inspection. The container image is already available at ${IMAGE_NAME}:${RELEASE_TAG} because GHCR does not have a draft release state."
          } >> "$GITHUB_STEP_SUMMARY"
