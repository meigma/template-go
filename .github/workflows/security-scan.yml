name: Security Scan

on:
  schedule:
    - cron: "37 9 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container-vulnerability-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build local scan image
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg VERSION="security-scan-${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg SOURCE="https://github.com/${GITHUB_REPOSITORY}" \
            -t template-go:security-scan \
            .

      - name: Scan local image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: template-go:security-scan
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          hide-progress: true
          limit-severities-for-sarif: true

      - name: Upload scan results
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-results.sarif
          category: container-vulnerability-scan
