# Disabled workflow template.
# To enable it, move this file to .github/workflows/release.yml.
#
# This workflow is tag-triggered by Release Please. It builds release assets
# with GoReleaser without direct publishing, uploads them to the draft GitHub
# release, attests checksums.txt through GitHub-hosted attestations, and leaves
# publication as a human decision after inspection.

name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true
        type: string

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            v*) ;;
            *) echo "Release tag must start with v: $tag" >&2; exit 1 ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out requested tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout --detach "${{ steps.release-tag.outputs.tag }}"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Wait for draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          for attempt in $(seq 1 30); do
            if gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
              exit 0
            fi
            echo "Draft release $RELEASE_TAG is not ready yet; retrying..."
            sleep 10
          done

          echo "Draft release $RELEASE_TAG was not found or is not a draft." >&2
          exit 1

      - name: Run GoReleaser without publishing
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Stage and validate ghd release assets
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          binary_name="template-go"
          asset_prefix="${binary_name}_"
          expected_signer="${GITHUB_REPOSITORY}/.github/workflows/release.yml"
          actual_signer="$(awk -F'"' '/signer_workflow/ { print $2; exit }' ghd.toml)"

          if [ "$version" = "$RELEASE_TAG" ] || [ -z "$version" ]; then
            echo "could not resolve release version from $RELEASE_TAG" >&2
            exit 1
          fi

          if [ "$actual_signer" != "$expected_signer" ]; then
            echo "ghd.toml signer_workflow must be $expected_signer, got $actual_signer" >&2
            exit 1
          fi

          grep -Fq "name = \"$binary_name\"" ghd.toml
          grep -Fq "tag_pattern = \"v\${version}\"" ghd.toml
          grep -Fq "path = \"$binary_name\"" ghd.toml

          mkdir -p dist/release-assets

          jq -r --arg asset_prefix "$asset_prefix" '
            .[]
            | select(
                (.type == "Binary" and (.name | startswith($asset_prefix))) or
                (.type == "SBOM" and (.name | startswith($asset_prefix))) or
                (.type == "Checksum" and .name == "checksums.txt")
              )
            | [.type, .name, .path]
            | @tsv
          ' dist/artifacts.json |
          while IFS="$(printf '\t')" read -r type name artifact_path; do
            case "$type" in
              Binary)
                cp "$artifact_path" "dist/release-assets/$name"
                chmod 0755 "dist/release-assets/$name"
                ;;
              SBOM)
                cp "$artifact_path" "dist/release-assets/$(basename "$artifact_path")"
                ;;
              Checksum)
                cp "$artifact_path" "dist/release-assets/checksums.txt"
                ;;
            esac
          done

          test -f dist/release-assets/checksums.txt
          (cd dist/release-assets && shasum -a 256 -c checksums.txt)

          for os in darwin linux; do
            for arch in amd64 arm64; do
              expected="${binary_name}_${version}_${os}_${arch}"
              expected_sbom="${expected}.sbom.json"
              expected_pattern="pattern = \"${binary_name}_\${version}_${os}_${arch}\""

              test -x "dist/release-assets/$expected"
              test -f "dist/release-assets/$expected_sbom"
              grep -Fq "$expected_pattern" ghd.toml
              awk -v name="$expected" '$2 == name && length($1) == 64 && $1 ~ /^[[:xdigit:]]+$/ { found = 1 } END { exit(found ? 0 : 1) }' dist/release-assets/checksums.txt
            done
          done

          asset_count="$(find dist/release-assets -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" != "9" ]; then
            echo "expected 9 draft release assets, found $asset_count" >&2
            find dist/release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi

          find dist/release-assets -maxdepth 1 -type f -print | sort

      - name: Smoke test release binary
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          binary_name="template-go"
          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          bin="dist/release-assets/${binary_name}_${version}_${host_os}_${host_arch}"

          if [ ! -x "$bin" ]; then
            echo "failed to locate executable host binary artifact $bin" >&2
            find dist/release-assets -maxdepth 1 -type f -print | sort >&2
            exit 1
          fi

          output="$("$bin" --version)"
          printf '%s\n' "$output"

          case "$output" in
            "$binary_name "*"$version"*) ;;
            *) echo "unexpected version output: $output" >&2; exit 1 ;;
          esac

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/release-assets/* --clobber

      - name: Attest release checksums
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/release-assets/checksums.txt

      - name: Write inspection summary
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          version="${RELEASE_TAG#v}"
          {
            echo "## Draft release ready for inspection"
            echo
            echo "Release: $RELEASE_TAG"
            echo
            echo "Useful verification commands:"
            echo
            echo '```sh'
            echo "gh release view $RELEASE_TAG --repo $GITHUB_REPOSITORY --json isDraft,assets"
            echo "asset=\"template-go_${version}_\$(go env GOOS)_\$(go env GOARCH)\""
            echo "gh attestation verify \"dist/release-assets/\${asset}\" --repo \"$GITHUB_REPOSITORY\" --signer-workflow \"$GITHUB_REPOSITORY/.github/workflows/release.yml\" --source-ref \"refs/tags/$RELEASE_TAG\" --deny-self-hosted-runners"
            echo "ghd download \"$GITHUB_REPOSITORY/template-go@${version}\" --output \"\$(mktemp -d)\""
            echo '```'
            echo
            echo "Publish or reject the draft release manually after inspection. The ghd download command only succeeds after the draft is published and GitHub emits the immutable release attestation."
          } >> "$GITHUB_STEP_SUMMARY"
